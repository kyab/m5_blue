; Current setup uses Arduino framework bundled with platform 6.8.1, which is
; built on ESP-IDF 4.4.7. So AudioTools I2S uses Legacy API (i2s_write).
; To use ESP-IDF 5.x (new I2S API), see alternatives below and DOCS_ESPIDF_UPGRADE.md.

[env:m5stack-core2]
platform = espressif32 @ 6.8.1
board = m5stack-core2
framework = arduino
; framework = espidf

monitor_speed = 115200
; Reset while monitoring: Ctrl+T then R (toggle RTS) or Ctrl+T then D (toggle DTR).
; One of these usually resets ESP32/M5Stack so you can see boot log again.
monitor_filters = esp32_exception_decoder, time, log2file
build_flags = 
	-DBOARD_HAS_PSRAM
	-DCORE_DEBUG_LEVEL=3
	-mfix-esp32-psram-cache-issue
lib_deps = 
	m5stack/M5Unified
	https://github.com/pschatzmann/arduino-audio-tools.git

; Module-Audio: submodule (custom branch) with ES8388 init pop mitigation. ESP32-A2DP: submodule (custom).
lib_extra_dirs =
	${PROJECT_DIR}/ESP32-A2DP
	${PROJECT_DIR}/Module-Audio

build_src_filter = +<*> -<main_noise_test.cpp>

build_type = debug

; Noise-floor test env. Builds only src/main_noise_test.cpp, with BLE/A2DP/Wi-Fi
; left uninitialised (and explicitly disabled at runtime). Plays 1 kHz sine, zero,
; sine, +-1 LSB dither in 2s segments. Use to A/B compare USB vs battery power.
[env:m5stack-core2-noise-test]
platform = espressif32 @ 6.8.1
board = m5stack-core2
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, log2file
build_flags = 
	-DBOARD_HAS_PSRAM
	-DCORE_DEBUG_LEVEL=3
	-DNOISE_TEST_BUILD=1
	-mfix-esp32-psram-cache-issue
lib_deps = 
	m5stack/M5Unified
	https://github.com/pschatzmann/arduino-audio-tools.git

lib_extra_dirs =
	${PROJECT_DIR}/Module-Audio

build_src_filter = -<*> +<main_noise_test.cpp>

build_type = debug
